
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="./assets/avatar.png" type="image/png" />

    <title>BezzubickMCPlay | Ссылки</title>
    <meta name="description" content="Официальная страница BezzubickMCPlay: Minecraft-приключения, стримы, последние видео, социальные сети и скин." />
    <meta name="keywords" content="BezzubickMCPlay, Minecraft, Майнкрафт, YouTube, Twitch, Telegram, TikTok, VK, ссылки, стрим" />

    <meta property="og:title" content="BezzubickMCPlay | Ссылки" />
    <meta property="og:description" content="Minecraft-приключения, стримы, видео и скин." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://httydcraft.github.io/BezzubickMCPlay/links/" />
    <meta property="og:image" content="https://httydcraft.github.io/BezzubickMCPlay/links/assets/avatar.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BezzubickMCPlay | Ссылки" />
    <meta name="twitter:image" content="https://httydcraft.github.io/BezzubickMCPlay/links/assets/avatar.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Cross-page theme/lang sync -->
    <script>
        (function(){
            try {
                var t = localStorage.getItem('theme') || localStorage.getItem('home_theme');
                var l = localStorage.getItem('lang')  || localStorage.getItem('home_lang');
                if (t) { localStorage.setItem('theme', t); localStorage.setItem('home_theme', t); }
                if (l) { localStorage.setItem('lang',  l); localStorage.setItem('home_lang',  l); }
                if (t === 'light') document.documentElement.classList.add('pre-light');
            } catch(e){}
        })();
    </script>

    <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="dark-theme">

<svg class="sr-svg" aria-hidden="true" focusable="false">
    <defs>
        <filter id="lg-refract" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.014 0.018" numOctaves="2" seed="7" result="noise"/>
            <feGaussianBlur in="noise" stdDeviation="2" result="softNoise"/>
            <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="lg-refract-sm" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.02 0.024" numOctaves="2" seed="3" result="n"/>
            <feGaussianBlur in="n" stdDeviation="1.4" result="sn"/>
            <feDisplacementMap in="SourceGraphic" in2="sn" scale="8" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="lg-cursor" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.03 0.03" numOctaves="2" seed="11" result="cn"/>
            <feDisplacementMap in="SourceGraphic" in2="cn" scale="10" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<div class="bg-stage" aria-hidden="true">
    <div class="bg-grain"></div>
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>
    <div class="bg-blob bg-blob--4"></div>
    <div class="bg-blob bg-blob--5"></div>
    <div class="bg-vignette"></div>
</div>

<div class="glass-cursor" aria-hidden="true">
    <div class="glass-cursor__lens"></div>
</div>

<nav class="dock" id="dock" aria-label="Навигация">
    <div class="dock__pill lg-pill">
        <a class="dock__item" href="../">
            <span class="material-symbols-outlined">home</span>
            <span class="dock__label">Главная</span>
        </a>
        <a class="dock__item is-active" href="./">
            <span class="material-symbols-outlined">link</span>
            <span class="dock__label">Ссылки</span>
        </a>
    </div>
</nav>

<div id="offline-warning" class="offline-banner hidden" role="status" aria-live="polite">
    <span class="material-symbols-outlined">cloud_off</span>
    <span id="offline-message">Нет соединения</span>
</div>

<div id="app" class="page-links">

    <div id="main-view">

        <section id="profile-section" class="profile hidden">
            <div class="profile__avatar-ring">
                <img id="avatar" class="profile__avatar" src="./assets/avatar.png" alt="Аватар" />
            </div>
            <h1 id="profile-name" class="profile__name"></h1>
            <p id="profile-description" class="profile__desc"></p>
            <div id="total-followers" class="profile__stat lg-chip">
                <span class="profile__stat-pulse"></span>
            </div>
        </section>

        <div id="content-grid" class="links-grid grid-no-live">

            <section id="live-stream-section" class="lg-panel live-card hidden">
                <div class="live-card__media">
                    <div class="live-card__embed">
                        <iframe id="live-embed" frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen></iframe>
                    </div>
                    <div class="live-badge">
                        <span class="live-badge__dot"></span>
                        <span>LIVE</span>
                    </div>
                </div>
                <div id="twitch-notification" class="twitch-notice hidden">
                    <p id="twitch-message"></p>
                    <a id="twitch-link" href="#" target="_blank" rel="noopener noreferrer" class="btn btn--ghost btn--sm">
                        <span class="material-symbols-outlined">videocam</span>
                        <span id="twitch-link-text"></span>
                    </a>
                </div>
            </section>

            <div class="main-links-block">
                <section id="links-section" class="links-list hidden"></section>
                <section id="support-section" class="support-row hidden">
                    <a id="support-button" href="#" target="_blank" rel="noopener noreferrer" class="btn btn--accent btn--block">
                        <span class="material-symbols-outlined">favorite</span>
                        <span id="support-button-text"></span>
                    </a>
                </section>
            </div>

            <section id="minecraft-block" class="lg-panel skin-card hidden">
                <header class="panel__head">
                    <h2 id="minecraft-title" class="panel__title"></h2>
                </header>
                <div id="skin-viewer-container" class="skin-card__viewer">
                    <canvas id="skin-canvas"></canvas>
                </div>
                <button id="download-skin-button" class="btn btn--primary btn--block">
                    <span class="material-symbols-outlined">download</span>
                    <span id="download-skin-text"></span>
                </button>
            </section>
        </div>

        <section id="youtube-videos-section" class="section hidden">
            <header class="section__head">
                <h2 id="recent-videos-title" class="section__title"></h2>
            </header>
            <div id="video-carousel" class="carousel" tabindex="0"></div>
        </section>
    </div>

    <div id="dev-view" class="dev-view hidden">
        <h2 id="dev-title" class="section__title"></h2>
        <div class="lg-panel">
            <p><span id="dev-last-updated-label" class="dev-label"></span> <span id="dev-last-updated" class="dev-value"></span></p>
            <h3 id="dev-data-json-content-label" class="dev-h3"></h3>
            <pre class="dev-pre"><code id="dev-data-json-content"></code></pre>
            <h3 id="dev-debug-info-content-label" class="dev-h3"></h3>
            <pre class="dev-pre dev-pre--sm"><code id="dev-debug-info-content"></code></pre>
        </div>
        <div class="dev-actions">
            <button id="back-to-main-button" class="btn btn--primary">
                <span class="material-symbols-outlined">arrow_back</span>
                <span id="back-to-main-text"></span>
            </button>
        </div>
    </div>

    <footer class="footer-controls">
        <div class="footer-controls__pill lg-pill">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
            </button>
            <button id="language-toggle" class="icon-btn" aria-label="Toggle language">
                <span class="material-symbols-outlined">language</span>
            </button>
            <button id="dev-toggle" class="icon-btn hidden" aria-label="Toggle developer view">
                <span class="material-symbols-outlined">code</span>
            </button>
        </div>
        <p class="footer-controls__sig">© BezzubickMCPlay</p>
    </footer>

    <div id="first-visit-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal__backdrop"></div>
        <div class="modal__content lg-panel">
            <h3 id="modal-title" class="modal__title"></h3>
            <p id="modal-description" class="modal__desc"></p>
            <button id="modal-close" class="btn btn--primary"></button>
        </div>
    </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
