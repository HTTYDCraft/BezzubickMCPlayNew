
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="./links/assets/avatar.png" type="image/png" />

    <title>BezzubickMCPlay | Дом</title>
    <meta name="description" content="BezzubickMCPlay — Minecraft, стримы, скин, ссылки." />

    <meta property="og:title" content="BezzubickMCPlay" />
    <meta property="og:description" content="Minecraft, стримы, скин, ссылки." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://httydcraft.github.io/BezzubickMCPlay/" />
    <meta property="og:image" content="https://httydcraft.github.io/BezzubickMCPlay/links/assets/avatar.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./home/home.css" />
</head>
<body class="dark-theme">

<!-- ───── Жидкие фоновые «капли» (Liquid Glass background) ───── -->
<div class="bg-stage" aria-hidden="true">
    <div class="bg-grain"></div>
    <div class="bg-blob bg-blob--1"></div>
    <div class="bg-blob bg-blob--2"></div>
    <div class="bg-blob bg-blob--3"></div>
    <div class="bg-blob bg-blob--4"></div>
    <div class="bg-vignette"></div>
</div>

<!-- ───── Светящийся курсор (desktop only, hidden on touch) ───── -->
<div class="cursor-trail" aria-hidden="true">
    <div class="cursor-trail__dot"></div>
    <div class="cursor-trail__halo"></div>
</div>

<!-- ───── Оффлайн-баннер ───── -->
<div id="offline-warning" class="offline-banner hidden" role="status" aria-live="polite">
    <span class="material-symbols-outlined">cloud_off</span>
    <span>Нет соединения — показаны последние данные</span>
</div>

<!-- ───── Safari-pill auto-hiding navigation ───── -->
<nav class="dock" id="dock" aria-label="Главная навигация">
    <div class="dock__pill glass glass--strong">
        <a class="dock__item" href="#hero" data-target="hero">
            <span class="material-symbols-outlined">home</span>
            <span class="dock__label">Главная</span>
        </a>
        <a class="dock__item" href="#content" data-target="content">
            <span class="material-symbols-outlined">videocam</span>
            <span class="dock__label">Стрим</span>
        </a>
        <a class="dock__item" href="#skin" data-target="skin">
            <span class="material-symbols-outlined">person</span>
            <span class="dock__label">Скин</span>
        </a>
        <a class="dock__item" href="#videos" data-target="videos">
            <span class="material-symbols-outlined">smart_display</span>
            <span class="dock__label">Видео</span>
        </a>
        <a class="dock__item" href="#about" data-target="about">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="dock__label">О канале</span>
        </a>
        <a class="dock__item" href="./links/" data-external>
            <span class="material-symbols-outlined">link</span>
            <span class="dock__label">Ссылки</span>
        </a>
    </div>
</nav>

<main class="page">

    <!-- ───── HERO ───── -->
    <section id="hero" class="hero">
        <div class="hero__inner">
            <div class="hero__eyebrow glass glass--chip">
                <span class="hero__pulse"></span>
                <span id="totals">—</span>
            </div>
            <h1 class="hero__title">BezzubickMCPlay</h1>
            <p class="hero__tagline" id="hero-tagline"></p>

            <div class="hero__actions">
                <a id="go-links-btn" href="./links/" class="btn btn--primary">
                    <span class="material-symbols-outlined">apps</span>
                    <span id="go-links-text"></span>
                </a>
                <a id="cta-ytsub" href="#" target="_blank" rel="noopener" class="btn btn--ghost">
                    <span class="material-symbols-outlined">subscriptions</span>
                    <span id="cta-ytsub-text"></span>
                </a>
                <a id="cta-telegram" href="#" target="_blank" rel="noopener" class="btn btn--ghost">
                    <span class="material-symbols-outlined">send</span>
                    <span id="cta-telegram-text"></span>
                </a>
                <a id="cta-support" href="#" target="_blank" rel="noopener" class="btn btn--accent">
                    <span class="material-symbols-outlined">favorite</span>
                    <span id="cta-support-text"></span>
                </a>
            </div>
        </div>
        <div class="hero__scroll-hint" aria-hidden="true">
            <span class="material-symbols-outlined">expand_more</span>
        </div>
    </section>

    <!-- ───── CONTENT GRID: Live + Calendar + Skin ───── -->
    <section id="content" class="section">
        <div id="content-grid" class="content-grid no-live">

            <!-- NAV / promo card (видна когда нет лайва) -->
            <article class="panel glass nav-card" aria-labelledby="nav-title">
                <header class="panel__head">
                    <h2 id="nav-title" class="panel__title"></h2>
                </header>
                <p class="panel__desc" id="nav-desc"></p>
                <a id="go-links-btn-2" href="./links/" class="btn btn--primary btn--block">
                    <span class="material-symbols-outlined">apps</span>
                    <span id="nav-cta-text"></span>
                </a>
            </article>

            <!-- LIVE -->
            <article id="live" class="panel glass live-card hidden" aria-labelledby="live-badge-label">
                <div class="live-card__media">
                    <div id="live-embed-wrap" class="live-card__embed">
                        <iframe id="live-embed" frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen></iframe>
                    </div>
                    <div id="live-badge" class="live-badge">
                        <span class="live-badge__dot"></span>
                        <span id="live-badge-label">LIVE</span>
                    </div>
                </div>
                <div id="twitch-notice" class="twitch-notice hidden">
                    <p id="twitch-text"></p>
                    <a id="twitch-link" href="#" target="_blank" rel="noopener" class="btn btn--ghost btn--sm">
                        <span class="material-symbols-outlined">videocam</span>
                        <span id="twitch-cta"></span>
                    </a>
                </div>
            </article>

            <!-- LIVE EMPTY STATE -->
            <div class="live-empty">
                <h3 id="live-empty-title" class="live-empty__title"></h3>
                <p id="live-empty-sub" class="live-empty__sub"></p>
            </div>

            <!-- CALENDAR -->
            <article id="calendar" class="panel glass calendar-card" aria-labelledby="cal-label">
                <header class="calendar-card__head">
                    <button id="cal-prev" class="icon-btn" aria-label="Предыдущий месяц">
                        <span class="material-symbols-outlined">chevron_left</span>
                    </button>
                    <h2 id="cal-label" class="panel__title"></h2>
                    <button id="cal-next" class="icon-btn" aria-label="Следующий месяц">
                        <span class="material-symbols-outlined">chevron_right</span>
                    </button>
                </header>
                <div id="cal-weekdays" class="cal-weekdays"></div>
                <div id="cal-grid" class="cal-grid"></div>
                <footer class="cal-legend">
                    <span class="cal-legend__item"><span class="dot yt"></span><span id="legend-yt"></span></span>
                    <span class="cal-legend__item"><span class="dot tw"></span><span id="legend-tw"></span></span>
                    <span class="cal-legend__item"><span class="dot both"></span><span id="legend-both"></span></span>
                    <span class="cal-legend__item"><span class="dot planned"></span><span id="legend-planned"></span></span>
                    <span class="cal-legend__item"><span class="dot missed"></span><span id="legend-missed"></span></span>
                </footer>
            </article>

            <!-- SKIN -->
            <article id="skin" class="panel glass skin-card">
                <header class="panel__head">
                    <h2 id="skin-title" class="panel__title"></h2>
                </header>
                <div id="skin-viewer" class="skin-card__viewer">
                    <canvas id="skin-canvas"></canvas>
                </div>
                <div id="skin-controls" class="skin-card__controls"></div>
                <button id="download-skin" class="btn btn--primary btn--block">
                    <span class="material-symbols-outlined">download</span>
                    <span id="skin-download-text"></span>
                </button>
            </article>

        </div>
    </section>

    <!-- ───── VIDEOS CAROUSEL ───── -->
    <section id="videos" class="section">
        <header class="section__head">
            <h2 id="videos-title" class="section__title"></h2>
        </header>
        <div id="carousel" class="carousel" tabindex="0" aria-label="Последние видео"></div>
    </section>

    <!-- ───── ABOUT + TIMELINE ───── -->
    <section id="about" class="section">
        <article class="panel glass about-card">
            <div id="about-intro" class="md"></div>

            <div class="timeline-head">
                <h2 id="timeline-title" class="panel__title"></h2>
                <div class="timeline-actions">
                    <button id="tl-expand" class="btn btn--ghost btn--sm">
                        <span class="material-symbols-outlined">unfold_more</span>
                        <span id="tl-expand-text"></span>
                    </button>
                    <button id="tl-collapse" class="btn btn--ghost btn--sm">
                        <span class="material-symbols-outlined">unfold_less</span>
                        <span id="tl-collapse-text"></span>
                    </button>
                </div>
            </div>

            <div id="timeline" class="timeline-list"></div>

            <div id="about-outro" class="md md--outro"></div>
        </article>
    </section>

    <!-- ───── FOOTER CONTROLS ───── -->
    <footer class="footer-controls">
        <div class="footer-controls__pill glass glass--strong">
            <button id="theme-toggle-bottom" class="icon-btn" aria-label="Сменить тему">
                <span class="material-symbols-outlined" id="theme-icon-bottom">dark_mode</span>
            </button>
            <button id="lang-toggle-bottom" class="icon-btn" aria-label="Сменить язык">
                <span class="material-symbols-outlined">language</span>
            </button>
        </div>
        <p class="footer-controls__sig">© BezzubickMCPlay · Made with care</p>
    </footer>

    <!-- Скрытые legacy-кнопки (для совместимости с home.js, который ищет theme-toggle и lang-toggle) -->
    <button id="theme-toggle" class="visually-hidden" aria-hidden="true" tabindex="-1">
        <span id="theme-icon"></span>
    </button>
    <button id="lang-toggle" class="visually-hidden" aria-hidden="true" tabindex="-1"></button>

</main>

<script type="module" src="./home/home.js"></script>
</body>
</html>
